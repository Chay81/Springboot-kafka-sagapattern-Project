name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build all services manually
        run: |
          cd order-service && mvn clean install -DskipTests && cd ..
          cd inventory-service && mvn clean install -DskipTests && cd ..
          cd spring-gateway && mvn clean install -DskipTests && cd ..
          cd eureka-server && mvn clean install -DskipTests && cd ..

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
