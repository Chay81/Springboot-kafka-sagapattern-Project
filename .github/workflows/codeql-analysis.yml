name: "CodeQL"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 0 * * 0' # weekly scan

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ]  # Change if needed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      # Replace autobuild with manual Maven build
      - name: Build all services manually
        run: |
          cd order-service && mvn clean install -DskipTests && cd ..
          cd inventory-service && mvn clean install -DskipTests && cd ..
          cd Spring-Gateway && mvn clean install -DskipTests && cd ..
          cd eureka-server && mvn clean install -DskipTests && cd ..

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
