server:
  port: 8765

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

      routes:
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/orders/**
        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/inventory/**
        - id: customer-service
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/customers/**, /login, /customer/forgotPassword, /customer/logout, /refreshToken, /admin/tokens/expired
            - Method=GET,POST,PUT,PATCH
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
        - name: RequestLogging

      httpclient:
        wiretap: true

jwt:
  secret: mysecretkey1234567890mysecretkey1234567890 # Key used to sign the token (HMAC-SHA256 key)
  expiration: 1800000  # in milliseconds (30 minutes) Duration the token stays valid

rsa:
  public-key: classpath:public_key.pem
  private-key: classpath:private_key.pem

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}:${server.port}}
    hostname: localhost

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
    prometheus:
      enabled: true
  info:
    env:
      enabled: true

  metrics:
    export:
      prometheus:
        enabled: true
        tags:
          enabled: true

info:
  app:
    name: ${spring.application.name}
    version: 1.0.0
    description: Spring Cloud Gateway for microservices


logging:
  level:
    org.springframework.boot.actuate.endpoint.web.servlet: DEBUG
    org.springframework.boot.actuate.endpoint: DEBUG
    org.springframework.boot.actuate.endpoint.web: DEBUG
    org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping: DEBUG
    org.springframework.cloud.gateway.filter.GatewayFilterChain: DEBUG
    org.springframework.web.reactive.function.client: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.kafka: INFO
    org.springframework.web: INFO
    org.springframework.http.convertor.json: DEBUG