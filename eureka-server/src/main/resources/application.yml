spring:
  application:
    name: Eureka_Server

#configuration for eureka server

server:
  port: 8761

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    server:
      wait-time-in-ms-when-sync-empty: 0
    service-url:
      defaultZone: http://localhost:8761/eureka/
