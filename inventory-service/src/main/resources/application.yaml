server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kafka
    username: LocalUser
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: inventory-service

# route configuration
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: host.docker.internal:9092
    consumer:
      group-id: inventory-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: '*'
      listener:
        ack-mode: record
        missing-topics-fatal: false
        concurrency: 1
      template:
        default-topic: orders
    # Retry and DLQ settings
    retry:
      max-attempts: 3
      backoff:
        interval: 2000 # 2 seconds, mentioned in milliseconds

# Eureka Configuration
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}:${server.port}}
    hostname: localhost

# Actuator configuration for health checks, metrics, etc. and to expose endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    db:
      enabled: true
    disk-space:
      enabled: true
    kafka:
      enabled: true
    shutdown:
      enabled: true
  info:
    env:
      enabled: true

# actuator for info behaviour
info:
    app:
        name: ${spring.application.name}
        version: 1.0.0
        description: Inventory Service for managing order inventory


# logging configuration
logging:
  level:
    org.springframework.kafka: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG
  pattern:
    console: "{ \"timestamp\": \"%d{yyyy-MM-dd HH:mm:ss.SSS}\", \"level\": \"%p\", \"thread\": \"%t\", \"logger\": \"%c\", \"message\": \"%m\" }"

  #     configuration for Prometheus
  metrics:
    export:
      prometheus:
        enabled: true
        tags:
          enabled: true
  endpoints:
    web:
      exposure:
        include: "prometheus"
  endpoint:
    prometheus:
      enabled: true
  tags:
    application: ${spring.application.name}
    version: 1.0.0
    description: Inventory Service for microservices

  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
        - name: RequestLogging
      httpclient:
        wiretap: true





