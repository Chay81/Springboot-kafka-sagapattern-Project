server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kafka
    username: LocalUser
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: inventory-service

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
#    defer-datasource-initialization: true

  kafka:
    bootstrap-servers: host.docker.internal:9092
    consumer:
      group-id: inventory-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: '*'
      listener:
        ack-mode: record
        missing-topics-fatal: false
        concurrency: 1
      template:
        default-topic: orders
    # Retry and DLQ settings
    retry:
      max-attempts: 3
      backoff:
        interval: 2000 # 2 seconds, mentioned in milliseconds

# Eureka Configuration
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
#    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    hostname: localhost
    non-secure-port: 8082
  service-url:
    defaultZone: http://localhost:8761/eureka/

# Actuator configuration for health checks, metrics, etc. and to expose endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
    disk-space:
      enabled: true
    redis:
      enabled: false
    kafka:
      enabled: true