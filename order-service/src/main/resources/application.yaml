server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kafka
    username: LocalUser
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
        name: order-service
# JPA configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# kafka configuration
  kafka:
    admin:
      auto-create: true
    bootstrap-servers: host.docker.internal:9092
    producer:
      properties:
        allow-auto-create-topics: true
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    template:
      default-topic: orders

# Eureka Configuration
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    hostname: localhost
    non-secure-port: 8081
  service-url:
    defaultZone: http://localhost:8761/eureka/

# Actuator configuration for health checks, metrics, etc. and to expose endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
    disk-space:
      enabled: true
    redis:
      enabled: false
    kafka:
      enabled: true
