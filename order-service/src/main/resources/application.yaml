server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kafka
    username: LocalUser
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
        name: order-service

# route configuration
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true


# JPA configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# kafka configuration
  kafka:
    admin:
      auto-create: true
    bootstrap-servers: host.docker.internal:9092
    producer:
      properties:
        allow-auto-create-topics: true
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    template:
      default-topic: orders

# Eureka Configuration
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
        defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}:${server.port}}
    hostname: localhost

# Actuator configuration for health checks, metrics, etc. and to expose endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    db:
      enabled: true
    disk-space:
      enabled: true
    kafka:
      enabled: true
    shutdown:
      enabled: true
  info:
    env:
      enabled: true
# actuator for info behaviour
info:
    app:
        name: ${spring.application.name}
        version: 1.0.0
        description: Order Service for microservices

# logging configuration
logging:
  level:
    org.springframework.kafka: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.cloud.loadbalancer: DEBUG
  pattern:
        console: "{ \"timestamp\": \"%d{yyyy-MM-dd HH:mm:ss.SSS}\", \"level\": \"%p\", \"thread\": \"%t\", \"logger\": \"%c\", \"message\": \"%m\" }"


  #     configuration for Prometheus
  metrics:
    export:
      prometheus:
        enabled: true
        tags:
          enabled: true
  endpoints:
    web:
      exposure:
        include: "prometheus"
  endpoint:
    prometheus:
      enabled: true
  tags:
    application: ${spring.application.name}
    version: 1.0.0
    description: Order Service for microservices

  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
        - name: RequestLogging
      httpclient:
        wiretap: true

